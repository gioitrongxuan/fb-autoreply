<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB AutoReply Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e}
header{background:#1877f2;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:18px;font-weight:700}
.live{display:flex;align-items:center;gap:6px;font-size:13px}
.dot{width:8px;height:8px;background:#42f563;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:18px 24px}
.card{background:#fff;border-radius:12px;padding:18px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card .lbl{font-size:11px;color:#65676b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card .val{font-size:30px;font-weight:700;color:#1877f2}
.card .sub{font-size:11px;color:#65676b;margin-top:4px}

.main{display:grid;grid-template-columns:280px 1fr;gap:14px;padding:0 24px 16px}
.panel{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.ph{padding:12px 16px;border-bottom:1px solid #e4e6ea;font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.ph span{color:#65676b;font-size:11px;font-weight:400}
.pb{overflow-y:auto;max-height:360px}

.si{padding:10px 16px;border-bottom:1px solid #f0f2f5}
.si:last-child{border-bottom:none}
.sid{font-weight:600;font-size:12px;color:#1877f2;font-family:monospace}
.smeta{font-size:11px;color:#65676b;margin-top:2px}
.slast{font-size:12px;color:#444;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.mi{padding:7px 16px;display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid #f7f8fa}
.mi:last-child{border-bottom:none}
.mtime{font-size:11px;color:#999;white-space:nowrap;min-width:48px;padding-top:2px}
.mbubble{flex:1;min-width:0}
.msender{font-size:11px;color:#65676b;margin-bottom:2px;font-family:monospace}
.mtext{font-size:13px;padding:5px 10px;border-radius:8px;display:inline-block;max-width:100%;word-break:break-word}
.in .mtext{background:#f0f2f5;color:#1a1a2e}
.out .mtext{background:#e7f3ff;color:#1565d8}

.chat-wrap{padding:0 24px 24px}
.chat-title{padding:10px 0 8px;font-size:14px;font-weight:700}
.chat-panel{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.chat-msgs{padding:14px;min-height:140px;max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:7px}
.cm{max-width:72%}
.cm.user{align-self:flex-end}
.cm.bot{align-self:flex-start}
.cm .b{padding:8px 14px;border-radius:18px;font-size:13px;line-height:1.45}
.cm.user .b{background:#1877f2;color:#fff;border-bottom-right-radius:4px}
.cm.bot .b{background:#f0f2f5;color:#1a1a2e;border-bottom-left-radius:4px}
.cm.bot.thinking .b{color:#999;font-style:italic}
.cin{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #e4e6ea}
.cin input{flex:1;border:1px solid #ddd;border-radius:20px;padding:7px 14px;font-size:13px;outline:none}
.cin input:focus{border-color:#1877f2}
.cin button{background:#1877f2;color:#fff;border:none;border-radius:20px;padding:7px 18px;font-size:13px;cursor:pointer;font-weight:600}
.cin button:hover{background:#1565d8}
.cin button:disabled{background:#bcc0c4;cursor:default}

.empty{padding:28px 16px;text-align:center;color:#bcc0c4;font-size:13px}
</style>
</head>
<body>

<header>
  <h1>🤖 FB AutoReply Dashboard</h1>
  <div class="live"><div class="dot"></div> LIVE</div>
</header>

<div class="stats">
  <div class="card">
    <div class="lbl">Phiên hội thoại</div>
    <div class="val" id="s-sessions">—</div>
    <div class="sub">người dùng</div>
  </div>
  <div class="card">
    <div class="lbl">Tin nhắn (phiên này)</div>
    <div class="val" id="s-messages">—</div>
    <div class="sub">kể từ lúc khởi động</div>
  </div>
  <div class="card">
    <div class="lbl">Trạng thái</div>
    <div class="val" style="font-size:18px;padding-top:8px" id="s-status">—</div>
    <div class="sub">bot đang hoạt động</div>
  </div>
</div>

<div class="main">
  <div class="panel">
    <div class="ph">Phiên hội thoại <span id="sess-count"></span></div>
    <div class="pb" id="sess-list"><div class="empty">Chưa có hội thoại</div></div>
  </div>
  <div class="panel">
    <div class="ph">Luồng tin nhắn <span>tự động làm mới 3s</span></div>
    <div class="pb" id="msg-list"><div class="empty">Chưa có tin nhắn</div></div>
  </div>
</div>

<div class="chat-wrap">
  <div class="chat-title">💬 Test Chat với Bot</div>
  <div class="chat-panel">
    <div class="chat-msgs" id="chat-msgs">
      <div class="cm bot"><div class="b">Xin chào! Nhập tin nhắn để test bot.</div></div>
    </div>
    <div class="cin">
      <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." />
      <button id="chat-btn" onclick="sendChat()">Gửi</button>
    </div>
  </div>
</div>

<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function refresh(){
  try{
    const [sr,mr,sesr]=await Promise.all([
      fetch('/api/stats'),fetch('/api/messages'),fetch('/api/sessions')
    ]);
    const s=await sr.json(),m=await mr.json(),ses=await sesr.json();
    document.getElementById('s-sessions').textContent=s.active_sessions;
    document.getElementById('s-messages').textContent=s.total_messages;
    document.getElementById('s-status').textContent='✅ Online';
    renderSessions(ses);
    renderMessages(m);
  }catch(e){
    document.getElementById('s-status').textContent='❌ Lỗi';
  }
}

function renderSessions(list){
  const el=document.getElementById('sess-list');
  document.getElementById('sess-count').textContent=list.length+' phiên';
  if(!list.length){el.innerHTML='<div class="empty">Chưa có hội thoại</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="si">
      <div class="sid">${esc(s.sender)}</div>
      <div class="smeta">${s.msg_count} tin · ${s.last_seen||''}</div>
      <div class="slast">${esc(s.last_msg||'')}</div>
    </div>`).join('');
}

function renderMessages(list){
  const el=document.getElementById('msg-list');
  if(!list.length){el.innerHTML='<div class="empty">Chưa có tin nhắn</div>';return;}
  el.innerHTML=list.map(m=>`
    <div class="mi ${esc(m.direction)}">
      <div class="mtime">${esc(m.ts)}</div>
      <div class="mbubble">
        <div class="msender">${esc(m.sender)} ${m.direction==='in'?'→':'←'}</div>
        <div class="mtext">${esc(m.text)}</div>
      </div>
    </div>`).join('');
}

async function sendChat(){
  const inp=document.getElementById('chat-input');
  const btn=document.getElementById('chat-btn');
  const text=inp.value.trim();
  if(!text)return;
  addMsg(text,'user');
  inp.value='';
  btn.disabled=true;
  const thinking=addMsg('Đang trả lời...','bot thinking');
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    const data=await res.json();
    thinking.remove();
    addMsg(data.reply,'bot');
  }catch(e){
    thinking.remove();
    addMsg('Lỗi kết nối.','bot');
  }
  btn.disabled=false;
}

function addMsg(text,cls){
  const el=document.getElementById('chat-msgs');
  const div=document.createElement('div');
  div.className='cm '+cls;
  div.innerHTML=`<div class="b">${esc(text)}</div>`;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
  return div;
}

document.getElementById('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});
refresh();
setInterval(refresh,3000);
</script>
</body>
</html>
